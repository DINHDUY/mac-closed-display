name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  SWIFT_VERSION: '6.0'

jobs:
  create-release:
    name: Create Release
    runs-on: macos-14  # Apple Silicon runner
    
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"
        
    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
        
    - name: Cache Swift packages
      uses: actions/cache@v4
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Run tests
      run: swift test

    - name: Build app bundle
      run: |
        chmod +x scripts/build-app.sh
        ./scripts/build-app.sh ${{ steps.get_version.outputs.version }}

    - name: Strip binary
      run: strip ClosedDisplay.app/Contents/MacOS/ClosedDisplay

    - name: Import signing certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
        CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
        security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        rm $RUNNER_TEMP/cert.p12
        echo "✓ Certificate imported"

    - name: Code sign app bundle
      env:
        SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      run: |
        codesign --deep --force --options runtime \
          --entitlements ClosedDisplay.entitlements \
          --sign "$SIGNING_IDENTITY" \
          ClosedDisplay.app
        codesign --verify --deep --strict ClosedDisplay.app
        echo "✓ App bundle signed with Developer ID"

    - name: Notarize app bundle
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        ditto -c -k --keepParent ClosedDisplay.app ClosedDisplay-notarize.zip
        RESULT=$(xcrun notarytool submit ClosedDisplay-notarize.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --output-format json)
        echo "$RESULT"
        STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
        SUB_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        rm ClosedDisplay-notarize.zip
        if [ "$STATUS" != "Accepted" ]; then
          echo "Notarization failed (status: $STATUS). Fetching log..."
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          exit 1
        fi
        echo "✓ Notarization complete"

    - name: Staple notarization ticket
      run: |
        echo "Waiting for ticket to propagate to CDN..."
        sleep 30
        for attempt in 1 2 3 4 5; do
          xcrun stapler staple ClosedDisplay.app && break
          echo "Staple attempt ${attempt} failed, retrying in 30s..."
          sleep 30
        done
        xcrun stapler validate ClosedDisplay.app
        echo "✓ Notarization ticket stapled to app bundle"

    - name: Create TAR.GZ package
      run: |
        chmod +x scripts/create-release.sh
        ./scripts/create-release.sh ${{ steps.get_version.outputs.version }}

    - name: Create DMG package
      run: |
        chmod +x scripts/create-dmg.sh
        ./scripts/create-dmg.sh ${{ steps.get_version.outputs.version }}

    - name: Sign, notarize, and staple DMG
      env:
        SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        DMG="ClosedDisplay-v${VERSION}-arm64.dmg"
        codesign --sign "$SIGNING_IDENTITY" "$DMG"
        RESULT=$(xcrun notarytool submit "$DMG" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait --output-format json)
        echo "$RESULT"
        STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
        SUB_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        if [ "$STATUS" != "Accepted" ]; then
          echo "Notarization failed (status: $STATUS). Fetching log..."
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          exit 1
        fi
        echo "Waiting for ticket to propagate to CDN..."
        sleep 30
        for attempt in 1 2 3 4 5; do
          xcrun stapler staple "$DMG" && break
          echo "Staple attempt ${attempt} failed, retrying in 30s..."
          sleep 30
        done
        xcrun stapler validate "$DMG"
        echo "✓ DMG signed, notarized, and stapled"

    - name: Generate release notes
      id: generate_notes
      run: |
        VERSION=${{ steps.get_version.outputs.version }}

        cat > release_notes.md << 'EOF'
        ## ClosedDisplay v${{ steps.get_version.outputs.version }}

        A macOS utility that allows Apple Silicon Macs to run with the lid closed without requiring an external display.

        ### 📦 Installation

        **Option 1: DMG (Recommended)**
        1. Download `ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.dmg`
        2. Open the DMG
        3. Drag **ClosedDisplay.app** to your Applications folder
        4. Launch from Applications or Spotlight

        **Option 2: TAR.GZ**
        ```bash
        tar -xzf ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.tar.gz
        cp -R ClosedDisplay-v${{ steps.get_version.outputs.version }}/ClosedDisplay.app /Applications/
        open /Applications/ClosedDisplay.app
        ```

        ### ✨ Features

        - Menu bar icon showing active/suspended/disabled state
        - Prevents system sleep when laptop lid is closed
        - Suspend mode to temporarily allow sleep without fully disabling
        - Thermal safety monitoring (automatically reverts on overheating)
        - Power source awareness (AC/battery transitions)
        - Native macOS notifications on state change

        ### 📋 Requirements

        - macOS 14.0 or later
        - Apple Silicon Mac (M1/M2/M3/M4)

        ### 🔐 Verification

        **SHA256 Checksums:**
        ```
        $(cat ClosedDisplay-v${VERSION}-arm64.dmg.sha256)
        $(cat ClosedDisplay-v${VERSION}-arm64.tar.gz.sha256)
        ```

        ### 📖 Documentation

        See [README.md](README.md) for the full user guide.

        ### ⚠️ First-Launch Prompt

        macOS will show a permission prompt on first launch because the app controls system sleep settings. Click **OK** to allow it.

        ---

        **Note:** This app is signed with a Developer ID certificate and notarized by Apple. No Gatekeeper workarounds are needed.
        EOF
        
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.dmg
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.dmg.sha256
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.tar.gz
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.tar.gz.sha256
        fail_on_unmatched_files: true
        
    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-packages-v${{ steps.get_version.outputs.version }}
        path: |
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.dmg
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.dmg.sha256
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.tar.gz
          ClosedDisplay-v${{ steps.get_version.outputs.version }}-arm64.tar.gz.sha256
        retention-days: 90

    - name: Clean up keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
