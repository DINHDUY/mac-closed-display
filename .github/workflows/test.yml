name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  SWIFT_VERSION: '6.0'

jobs:
  test:
    name: Run Tests
    runs-on: macos-14  # Apple Silicon runner
    
    strategy:
      matrix:
        configuration: [debug, release]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Swift
      uses: swift-actions/setup-swift@v3
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
        
    - name: Cache Swift packages
      uses: actions/cache@v4
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ matrix.configuration }}-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-${{ matrix.configuration }}-
          ${{ runner.os }}-spm-
          
    - name: Build
      run: swift build -c ${{ matrix.configuration }}
      
    - name: Run tests
      run: swift test -c ${{ matrix.configuration }} --enable-code-coverage
      
    - name: Generate code coverage
      if: matrix.configuration == 'debug'
      run: |
        xcrun --toolchain swift llvm-cov export \
          .build/debug/ClosedDisplayPackageTests.xctest/Contents/MacOS/ClosedDisplayPackageTests \
          -instr-profile=.build/debug/codecov/default.profdata \
          -format=lcov > coverage.lcov
          
    - name: Upload coverage to Codecov
      if: matrix.configuration == 'debug'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.lcov
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
